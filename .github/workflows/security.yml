# Security scanning — runs on every push to main + every PR.
#
# Three independent jobs (run in parallel):
#   gitleaks     — full-history secret scan; backstop for pre-commit's SOPS check
#   trivy-config — IaC misconfiguration scan (k8s manifests, helm renders, Dockerfiles)
#   kube-linter  — k8s manifest quality (resource limits, privileged containers, ...)
#
# Pre-commit hook (.pre-commit-config.yaml) is the local fast-feedback layer;
# this workflow is the line that can't be bypassed via `git commit --no-verify`
# or "I cloned fresh and didn't run pre-commit install yet."

name: security-scan

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs (e.g., when a PR gets force-pushed). Saves CI minutes
# and avoids confusing "two runs, one passes one fails" UI.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    # Detects committed API keys, tokens, passwords. Scans full git history,
    # so it'll surface any pre-existing leaks from older commits (e.g. content
    # we deleted but lives forever in history). Triage findings as work items.
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed; gitleaks scans all commits, not just HEAD.
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-config:
    # IaC misconfiguration scan: Terraform under infrastructure/, k8s manifests
    # under apps/ + platform/, Dockerfiles, etc. CRITICAL/HIGH only to keep
    # signal high; bump to MEDIUM if we want to tighten later.
    #
    # skip-dirs scope (paths NOT scanned):
    #   - **/charts          helm chart caches from `kubectl kustomize --enable-helm`
    #   - infrastructure/kubernetes/installation/manual          legacy pre-ArgoCD reference
    #   - infrastructure/kubernetes/installation/automated/add-ons   helm-pull artifacts + samples
    name: trivy (IaC misconfig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          skip-dirs: '**/charts,infrastructure/kubernetes/installation/manual,infrastructure/kubernetes/installation/automated/add-ons'
          # Documented false-positives + legitimate exceptions, scoped per
          # file so a future workload with the same issue still fails CI.
          # Schema + rationale: see .trivyignore.yaml.
          trivyignores: '.trivyignore.yaml'

  kube-linter:
    # k8s manifest quality (missing resource limits, privileged containers,
    # missing liveness/readiness probes, etc.). Scoped to apps/ and platform/
    # — the live workload set. Vendored chart sources + bare-metal install
    # references under infrastructure/ are deliberately out of scope.
    name: kube-linter (manifest quality)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run kube-linter on apps/
        uses: stackrox/kube-linter-action@v1
        with:
          directory: apps
          format: plain
      - name: Run kube-linter on platform/
        uses: stackrox/kube-linter-action@v1
        with:
          directory: platform
          format: plain
