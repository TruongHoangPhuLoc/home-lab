# SOPS encryption configuration.
#
# Only files matching path_regex are subject to SOPS encryption. Within those
# files, only keys matching encrypted_regex have their values encrypted — so
# the metadata of a kind: Secret (name, namespace, labels) stays readable in
# git while data/stringData values are ciphertext.
#
# Private key lives at ~/.config/sops/age/keys.txt on the operator workstation
# plus a backup in a password manager. The public key below is safe to commit.
#
# See platform/argocd/BOOTSTRAP.md for setup, daily workflow, and recovery.

creation_rules:
  - path_regex: \.enc\.yaml$
    encrypted_regex: ^(data|stringData)$
    age: age1f2ga2qhdv6hpfhlelk7t633yzh78u4jdkwxkxrcpml5a7tzyd9ps99zmkj
