apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ksops-smoke-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TruongHoangPhuLoc/home-lab.git
    targetRevision: main
    path: _ksops-test
    plugin:
      name: ksops
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
