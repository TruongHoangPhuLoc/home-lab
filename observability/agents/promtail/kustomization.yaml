apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Kustomize-wraps-Helm pattern. At render time, argocd-repo-server's KSOPS
# sidecar runs: PATH=/helm-tools:$PATH kustomize build --enable-helm ...
# Kustomize fetches the upstream chart from grafana's repo and renders
# templates with our values.yaml overrides.

helmCharts:
  - name: promtail
    repo: https://grafana.github.io/helm-charts
    version: 6.16.4           # pinned; matches current in-cluster release
    releaseName: promtail
    namespace: logging
    valuesFile: values.yaml
