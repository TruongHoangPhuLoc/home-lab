apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/TruongHoangPhuLoc/home-lab.git
    targetRevision: main
    path: platform/cert-manager
    plugin:
      name: ksops
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    # Conservative during adoption. Promote to prune+selfHeal=true after
    # 2-3 clean sync cycles with no unexpected drift.
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
