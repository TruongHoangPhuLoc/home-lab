apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubelet-csr-approver
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/TruongHoangPhuLoc/home-lab.git
    targetRevision: main
    path: platform/kubelet-csr-approver
    plugin:
      name: ksops
  destination:
    server: https://kubernetes.default.svc
    namespace: kubelet-csr-approver
  syncPolicy:
    # Conservative defaults during adoption — flip to true in a SEPARATE
    # commit once 2–3 sync cycles run cleanly (per platform/CLAUDE.md rule 5).
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - ServerSideApply=true
      # The Namespace is shipped by deploy/namespace.yaml, so ArgoCD doesn't
      # need to create one. Keep this false to match the surrounding pattern.
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
