apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: observability
  source:
    repoURL: https://github.com/TruongHoangPhuLoc/home-lab.git
    targetRevision: main
    path: platform/observability/agents/promtail
    plugin:
      name: ksops
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    # Promoted to full auto-drive after initial adoption verified green.
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # Helm-controlled rolling-update field that shifts on pod template changes.
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /spec/templateGeneration
