apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/TruongHoangPhuLoc/home-lab.git
    targetRevision: main
    path: platform/observability/logging/loki
    plugin:
      name: ksops
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    # Conservative during adoption. Promote prune+selfHeal to true after
    # 2-3 clean sync cycles with no unexpected drift.
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
