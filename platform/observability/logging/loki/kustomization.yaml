apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Chart from grafana-community fork (the one currently installed in-cluster).
# The official grafana/loki chart only goes up to 7.0.0; we need 9.5.10 for
# parity with the existing release.
helmCharts:
  - name: loki
    repo: https://grafana-community.github.io/helm-charts
    version: 9.5.10
    releaseName: loki
    namespace: logging
    valuesFile: values.yaml

resources:
  - obc.yaml
