apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Two helm releases of the same chart — node-collector (DaemonSet, per-node)
# and cluster-collector (Deployment, cluster-wide). Both pinned to the same
# version so they stay in lockstep on upgrades.

helmCharts:
  - name: opentelemetry-collector
    repo: https://open-telemetry.github.io/opentelemetry-helm-charts
    version: 0.153.0
    releaseName: otel-collector-node
    namespace: observability
    valuesFile: values-node.yaml
  - name: opentelemetry-collector
    repo: https://open-telemetry.github.io/opentelemetry-helm-charts
    version: 0.153.0
    releaseName: otel-collector-cluster
    namespace: observability
    valuesFile: values-cluster.yaml
