# OpenTelemetry Collector — DaemonSet "node-collector". Per-node signal collection.
#
# Receivers (all node-local):
#   filelog (preset)        → /var/log/pods/*/*/*.log
#   hostmetrics (preset)    → CPU, memory, disk, network, filesystem
#   kubeletstats (preset)   → per-pod, per-container resource usage
#   otlp                    → traces from local app SDKs (B8) and OBI (B4)
#
# Exports:
#   logs    → otlphttp → Loki (loki-gateway.observability.svc)
#   metrics → otlp/grpc → otel-collector-cluster:4317 (aggregation point)
#   traces  → otlp/grpc → otel-collector-cluster:4317 (cluster-collector fans out to Tempo in B5)
#
# Logs ship straight to Loki (decoupled from cluster-collector uptime).
# Metrics & traces flow to the cluster-collector for centralised
# processing/enrichment before any cross-cluster export.

mode: daemonset
fullnameOverride: otel-collector-node

image:
  repository: otel/opentelemetry-collector-contrib

presets:
  logsCollection:
    enabled: true
    includeCollectorLogs: false
    storeCheckpoints: true
  hostMetrics:
    enabled: true
  kubeletMetrics:
    enabled: true
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: false
    extractAllPodAnnotations: false

# Bumped from 300m → 1000m after observing 3-of-6 pods pinned at the
# limit on busy nodes. Memory was nowhere near saturated; bumped modestly
# alongside for headroom. CPU pressure mostly from the k8sattributes
# processor on high-rate log streams.
resources:
  limits:
    memory: 512Mi
    cpu: 1000m
  requests:
    memory: 256Mi
    cpu: 200m

# DaemonSet must run on control-plane nodes too so kube-apiserver / etcd /
# scheduler / controller-manager logs and metrics are collected. The
# `Exists`-no-key toleration matches every taint on every node.
tolerations:
  - operator: Exists

config:
  processors:
    # Override the preset's 24-field default extraction. The trimmed list
    # below covers the workload-identification fields we actually use in
    # Loki / Prom queries; dropping the rest (uids, replicaset, image
    # tags, service.* derivations) cuts per-record CPU work and Loki
    # label cardinality at homelab scale.
    k8sattributes:
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.node.name
          - k8s.container.name
          - k8s.deployment.name
          - k8s.daemonset.name
          - k8s.statefulset.name
          - k8s.job.name
          - k8s.cronjob.name
  exporters:
    otlphttp/loki:
      endpoint: http://loki-gateway.observability.svc.cluster.local:80/otlp
      tls:
        insecure: true
    otlp/cluster:
      endpoint: otel-collector-cluster.observability.svc.cluster.local:4317
      tls:
        insecure: true
  service:
    pipelines:
      logs:
        exporters:
          - otlphttp/loki
      metrics:
        exporters:
          - otlp/cluster
      traces:
        exporters:
          - otlp/cluster

# kube-prom-stack ServiceMonitor support comes when metrics export is wired
# end-to-end (B7 — see PLAN.md). Until then, no scrape target.
serviceMonitor:
  enabled: false
