apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# external-snapshotter (kubernetes-csi/external-snapshotter).
# Pulls the upstream CRDs + controller manifests via kustomize remote
# bases. No helm chart wrapping — this project is upstream-stable, we
# don't customize anything, and remote bases keep the version bump down
# to a single ?ref= edit.
#
# Why we need it: rook-ceph's CSI provisioner sidecars include the
# upstream csi-snapshotter, which watches VolumeSnapshot* resources but
# doesn't ship the CRDs. Without these CRDs the sidecar logs noisy
# "could not find the requested resource" errors continuously and any
# PVC snapshot operation would fail.
#
# To upgrade: bump both ?ref= values to the new external-snapshotter
# release tag. Diff via `kustomize build` before sync.

resources:
  - https://github.com/kubernetes-csi/external-snapshotter/client/config/crd?ref=v8.5.0
  - https://github.com/kubernetes-csi/external-snapshotter/deploy/kubernetes/snapshot-controller?ref=v8.5.0

# Upstream manifests don't set resource requests/limits on the
# snapshot-controller container, which trips our trivy/kube-linter
# scan gate. Patch them in here. Values are conservative — the
# controller is a thin coordinator (lists VolumeSnapshot* objects,
# updates statuses), not a hot path.
patches:
  - target:
      kind: Deployment
      name: snapshot-controller
      namespace: kube-system
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: snapshot-controller
      spec:
        template:
          spec:
            containers:
              - name: snapshot-controller
                resources:
                  requests:
                    cpu: 10m
                    memory: 32Mi
                  limits:
                    cpu: 100m
                    memory: 128Mi
