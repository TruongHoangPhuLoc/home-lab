apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubelet-csr-approver
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: system
  source:
    repoURL: https://github.com/TruongHoangPhuLoc/home-lab.git
    targetRevision: main
    path: platform/system/kubelet-csr-approver
    plugin:
      name: ksops
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    # Conservative defaults during adoption — flip to true in a SEPARATE
    # commit once 2–3 sync cycles run cleanly (per platform/CLAUDE.md rule 5).
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - ServerSideApply=true
      # kube-system always exists; nothing to create.
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
